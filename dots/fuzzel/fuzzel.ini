[main]
font=JetBrainsMono Nerd Font Propo:size=10
icon-theme=Papirus
icons-enabled=yes
prompt="❯ "
width=38
lines=7
horizontal-pad=24
vertical-pad=18
inner-pad=10
line-height=32
letter-spacing=0
dpi-aware=yes
show-actions=no
layer=overlay
terminal=kitty
match-mode=fuzzy

[colors]
background=303446cc
text=c6d0f5ff
prompt=f4b8e4ff
placeholder=838ba7ff
input=c6d0f5ff
match=f4b8e4ff
selection=f4b8e4ff
selection-text=303446ff
selection-match=303446ff
counter=838ba7ff
border=f4b8e4ff

[border]
radius=16
width=2

[key-bindings]
cancel=Escape
execute=Return KP_Enter
