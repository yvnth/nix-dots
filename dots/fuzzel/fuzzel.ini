[main]
font=JetBrainsMono Nerd Font Propo:size=10
icon-theme=Papirus
icons-enabled=yes
prompt="󰔰 "
width=38
lines=7
horizontal-pad=24
vertical-pad=18
inner-pad=10
line-height=32
letter-spacing=0
dpi-aware=yes
show-actions=no
layer=overlay
terminal=wezterm
match-mode=fuzzy

[colors]
background=1e1e2edd
text=cdd6f4ff
prompt=cba6f7ff
placeholder=7f849cff
input=cdd6f4ff
match=cba6f7ff
selection=cba6f7ff
selection-text=1e1e2eff
selection-match=1e1e2eff
counter=7f849cff
border=cba6f7ff

[border]
radius=14
width=2

[key-bindings]
cancel=Escape Control+g
execute=Return KP_Enter
delete-prev=BackSpace
delete-next=Delete
cursor-left=Left Control+b
cursor-right=Right Control+f
cursor-home=Home Control+a
cursor-end=End Control+e
