theme = "catppuccin_mocha"

[editor]
color-modes = true
default-yank-register = "+"
line-number = "relative"

[editor.cursor-shape]
normal = "block"
insert = "bar"
select = "underline"

[editor.statusline]
mode.normal = "N"
mode.insert = "I"
mode.select = "S"
left = ["mode", "separator", "file-name"]
center = ["spinner"]
right = ["diagnostics", "selections", "position", "file-encoding"]
separator = ""

[editor.whitespace]
render = "all"

[editor.whitespace.characters]
space = "·"
tab = "→"
tabpad = "·"

[editor.file-picker]
hidden = false

[editor.indent-guides]
render = true
character = "|"
skip-levels = 1

[keys.normal]
space.e = [
    ":sh rm -f /tmp/unique-file-u41ae14",
    ":insert-output yazi '%{buffer_name}' --chooser-file=/tmp/unique-file-u41ae14",
    ":insert-output echo \"x1b[?1049h\" > /dev/tty",
    ":open %sh{cat /tmp/unique-file-u41ae14}",
    ":redraw",
]
space.E = [
    ":sh rm -f /tmp/unique-file-h21a434",
    ":insert-output yazi '%{workspace_directory}' --chooser-file=/tmp/unique-file-h21a434",
    ":insert-output echo \"x1b[?1049h\" > /dev/tty",
    ":open %sh{cat /tmp/unique-file-h21a434}",
    ":redraw",
]
