monitorrule=name:^eDP-1$,width:1920,height:1080,refresh:144,x:0,y:0,scale:1,rr:0

blur=0
shadows=0
animations=0

env=XCURSOR_THEME,Bibata-Modern-Classic
env=XCURSOR_SIZE,32

border_radius=0
no_radius_when_single=0
focused_opacity=1.0
unfocused_opacity=0.95
focuscolor=0xf4b8e4ff
bordercolor=0x00000000
maximizescreencolor=0xf4b8e4ff
scratchpadcolor=0xf4b8e4ff
urgentcolor=0xf4b8e4ff
globalcolor=0xf4b8e4ff
overlaycolor=0xf4b8e4ff
rootcolor=0x323232ff

scroller_structs=20
scroller_default_proportion=0.5
scroller_focus_center=0
scroller_prefer_center=0
scroller_prefer_overspread=0
scroller_ignore_proportion_single=1

new_is_master=1
default_mfact=0.5
default_nmaster=1
smartgaps=0
no_border_when_single=0

focus_on_activate=1
idleinhibit_ignore_visible=0
sloppyfocus=1
warpcursor=1
focus_cross_monitor=0
focus_cross_tag=0

enable_floating_snap=0
snap_distance=30

cursor_size=32
cursor_theme=Bibata-Modern-Classic

drag_tile_to_tile=1
repeat_delay=300
repeat_rate=50
numlockon=1
xkb_rules_layout=us

disable_trackpad=0
tap_to_click=1
tap_and_drag=1
drag_lock=1
trackpad_natural_scrolling=1
disable_while_typing=1
left_handed=0
middle_button_emulation=0
swipe_min_threshold=1
mouse_natural_scrolling=0

gappih=3
gappiv=3
gappoh=3
gappov=3

scratchpad_width_ratio=0.8
scratchpad_height_ratio=0.9
borderpx=3

exec-once=noctalia-shell
exec-once=swayidle -w timeout 300 'noctalia-shell ipc call lockScreen lock' timeout 600 'mmsg dispatch disable_monitor,eDP-1' resume 'mmsg dispatch enable_monitor,eDP-1' before-sleep 'noctalia-shell ipc call lockScreen lock'
exec-once=wl-paste --type text --watch cliphist store
exec-once=wl-paste --type image --watch cliphist store
exec-once=~/.config/mango/scripts/autostart.sh

bind=SUPER+SHIFT,r,spawn,~/.config/mango/scripts/reload-config.sh
bind=SUPER,Return,spawn,kitty
bind=SUPER,Q,killclient,
bind=SUPER+SHIFT,Q,quit,
bind=SUPER,B,spawn,firefox-devedition
bind=SUPER,P,spawn,rofi-pass
bind=SUPER,space,spawn,rofi -show drun
bind=SUPER+CTRL,space,spawn_shell,cliphist list | rofi -dmenu | cliphist decode | wl-copy
bind=SUPER+ALT,space,spawn,rofimoji --selector rofi --action copy
bind=SUPER+ALT,L,spawn,~/.config/mango/scripts/layout-change.sh
bind=SUPER+SHIFT,Escape,spawn,noctalia-shell ipc call lockScreen lock
bind=SUPER,F,togglemaximizescreen,
bind=SUPER+SHIFT,F,togglefullscreen,
bindr=NONE,Print,spawn_shell,grim -t ppm -g "$(slurp)" - | satty --filename - --fullscreen --copy-command wl-copy --output-filename ~/Pictures/screenshots/$(date +%Y-%m-%d_%H-%M-%S).png
bindr=SHIFT,Print,spawn,~/.config/mango/scripts/screen-record.sh
bind=SUPER+SHIFT,space,togglefloating,

bind=SUPER,H,focusdir,left
bind=SUPER,J,focusdir,down
bind=SUPER,K,focusdir,up
bind=SUPER,L,focusdir,right

bind=SUPER+SHIFT,H,exchange_client,left
bind=SUPER+SHIFT,J,exchange_client,down
bind=SUPER+SHIFT,K,exchange_client,up
bind=SUPER+SHIFT,L,exchange_client,right

bind=SUPER+CTRL,H,resizewin,-40,0
bind=SUPER+CTRL,L,resizewin,40,0
bind=SUPER+CTRL,K,resizewin,0,-40
bind=SUPER+CTRL,J,resizewin,0,40

bind=SUPER,1,view,1
bind=SUPER,2,view,2
bind=SUPER,3,view,3
bind=SUPER,4,view,4
bind=SUPER,5,view,5
bind=SUPER,6,view,6
bind=SUPER,7,view,7
bind=SUPER,8,view,8
bind=SUPER,9,view,9

bind=SUPER+SHIFT,1,tag,1
bind=SUPER+SHIFT,2,tag,2
bind=SUPER+SHIFT,3,tag,3
bind=SUPER+SHIFT,4,tag,4
bind=SUPER+SHIFT,5,tag,5
bind=SUPER+SHIFT,6,tag,6
bind=SUPER+SHIFT,7,tag,7
bind=SUPER+SHIFT,8,tag,8
bind=SUPER+SHIFT,9,tag,9

tagrule=id:1,layout_name:dwindle
tagrule=id:2,layout_name:dwindle
tagrule=id:3,layout_name:dwindle
tagrule=id:4,layout_name:dwindle
tagrule=id:5,layout_name:dwindle
tagrule=id:6,layout_name:dwindle
tagrule=id:7,layout_name:dwindle
tagrule=id:8,layout_name:dwindle
tagrule=id:9,layout_name:dwindle

bind=SUPER,S,toggle_scratchpad,
bind=SUPER+SHIFT,S,minimized,

mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_right,moveresize,curresize

bind=NONE,XF86AudioRaiseVolume,spawn,wpctl set-volume @DEFAULT_SINK@ 5%+
bind=NONE,XF86AudioLowerVolume,spawn,wpctl set-volume @DEFAULT_SINK@ 5%-
bind=NONE,XF86AudioMute,spawn,wpctl set-mute @DEFAULT_SINK@ toggle
bind=NONE,XF86AudioMicMute,spawn,wpctl set-mute @DEFAULT_SOURCE@ toggle
bind=NONE,XF86MonBrightnessUp,spawn,brightnessctl -e4 -n2 set 5%+
bind=NONE,XF86MonBrightnessDown,spawn,brightnessctl -e4 -n2 set 5%-
