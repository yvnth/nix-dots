"$schema" = "https://starship.rs/config-schema.json"
palette = "catppuccin_mocha"

format = """
$directory\
$git_branch\
$git_status\
$fill\
$cmd_duration\
$line_break\
$character"""

[fill]
symbol = " "

[cmd_duration]
min_time = 500
format = "[$duration]($style)"
style = "bold yellow"

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"

[character]
success_symbol = "[َ°”°](green)"
error_symbol = "[َ°”°](red)"
vimcmd_symbol = "[َ°”°](blue)"

[git_branch]
style = "bold mauve"
symbol = "ï„¦ "
format = "on [$symbol$branch]($style) "

[git_status]
format = "[$all_status$ahead_behind]($style) "
conflicted = "[َ°¬ں ${count}](red) "
ahead = "[َ°›ƒ ${count}](teal) "
behind = "[َ°›€ ${count}](peach) "
untracked = "[َ°„² ${count}](sapphire) "
stashed = "[َ°¬ڑ ${count}](lavender) "
modified = "[َ°ڈ¬ ${count}](yellow) "
staged = "[َ°گ– ${count}](green) "
renamed = "[َ°¬™ ${count}](maroon) "
deleted = "[َ°چµ ${count}](red) "

[directory]
truncation_length = 4
style = "bold lavender"

[battery]
disabled = true
