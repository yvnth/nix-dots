[app]
overall = { bg = "#1e1e2e" }

[mgr]
cwd = { fg = "#94e2d5" }

find_keyword = { fg = "#f9e2af", italic = true }
find_position = { fg = "#cba6f7", bg = "reset", italic = true }

marker_copied = { fg = "#a6e3a1", bg = "#a6e3a1" }
marker_cut = { fg = "#f38ba8", bg = "#f38ba8" }
marker_marked = { fg = "#94e2d5", bg = "#94e2d5" }
marker_selected = { fg = "#cba6f7", bg = "#cba6f7" }

count_copied = { fg = "#1e1e2e", bg = "#a6e3a1" }
count_cut = { fg = "#1e1e2e", bg = "#f38ba8" }
count_selected = { fg = "#1e1e2e", bg = "#cba6f7" }

border_symbol = "│"
border_style = { fg = "#585b70" }

syntect_theme = "~/.config/yazi/Catppuccin-Mocha.tmTheme"

[tabs]
active = { fg = "#1e1e2e", bg = "#cdd6f4", bold = true }
inactive = { fg = "#cdd6f4", bg = "#45475a" }

[mode]
normal_main = { fg = "#1e1e2e", bg = "#cba6f7", bold = true }
normal_alt = { fg = "#cba6f7", bg = "#313244" }

select_main = { fg = "#1e1e2e", bg = "#a6e3a1", bold = true }
select_alt = { fg = "#a6e3a1", bg = "#313244" }

unset_main = { fg = "#1e1e2e", bg = "#f38ba8", bold = true }
unset_alt = { fg = "#f38ba8", bg = "#313244" }

[indicator]
parent = { fg = "#1e1e2e", bg = "#cdd6f4" }
current = { fg = "#1e1e2e", bg = "#cba6f7" }
preview = { fg = "#1e1e2e", bg = "#cdd6f4" }

[status]
sep_left = { open = "", close = "" }
sep_right = { open = "", close = "" }

progress_label = { fg = "#f5e0dc", bold = true }
progress_normal = { fg = "#a6e3a1", bg = "#45475a" }
progress_error = { fg = "#f9e2af", bg = "#f38ba8" }

perm_type = { fg = "#89b4fa" }
perm_read = { fg = "#f9e2af" }
perm_write = { fg = "#f38ba8" }
perm_exec = { fg = "#a6e3a1" }
perm_sep = { fg = "#585b70" }

[input]
border = { fg = "#cba6f7" }
title = {}
value = {}
selected = { reversed = true }

[pick]
border = { fg = "#cba6f7" }
active = { fg = "#cba6f7" }
inactive = {}

[confirm]
border = { fg = "#cba6f7" }
title = { fg = "#cba6f7" }
body = {}
list = {}
btn_yes = { reversed = true }
btn_no = {}

[cmp]
border = { fg = "#cba6f7" }

[tasks]
border = { fg = "#cba6f7" }
title = {}
hovered = { fg = "#cba6f7", bold = true }

[which]
mask = { bg = "#313244" }
cand = { fg = "#94e2d5" }
rest = { fg = "#bac2de" }
desc = { fg = "#cba6f7" }
separator = "  "
separator_style = { fg = "#585b70" }

[help]
on = { fg = "#94e2d5" }
run = { fg = "#cba6f7" }
desc = { fg = "#bac2de" }
hovered = { bg = "#585b70", bold = true }
footer = { fg = "#cdd6f4", bg = "#45475a" }

[notify]
title_info = { fg = "#94e2d5" }
title_warn = { fg = "#f9e2af" }
title_error = { fg = "#f38ba8" }
