env=XCURSOR_THEME,Bibata-Modern-Classic
env=XCURSOR_SIZE,32

cursor_size=32
cursor_theme=Bibata-Modern-Classic

repeat_delay=300
repeat_rate=50
numlockon=1

xkb_rules_layout=us

disable_trackpad=0
tap_to_click=1
tap_and_drag=1
drag_lock=1

trackpad_natural_scrolling=1
disable_while_typing=1

left_handed=0
middle_button_emulation=0
swipe_min_threshold=1

mouse_natural_scrolling=0
