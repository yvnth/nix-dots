exec-once=waybar
exec-once=swayidle -w timeout 300 'swaylock -f' timeout 600 'mmsg dispatch disable_monitor,eDP-1' resume 'mmsg dispatch enable_monitor,eDP-1' before-sleep 'swaylock -f'
exec-once=wl-paste --type text --watch cliphist store
exec-once=wl-paste --type image --watch cliphist store
exec-once=~/.config/mango/scripts/autostart.sh
exec-once=~/.config/mango/scripts/battery-warning.sh
